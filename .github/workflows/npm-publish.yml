name: Publish package to NPM

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org/
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Publish server
        working-directory: packages/server
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.BILLIONS_NPM_PUBLISH_TOKEN}}
      - name: Publish client
        working-directory: packages/client
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.BILLIONS_NPM_PUBLISH_TOKEN}}
